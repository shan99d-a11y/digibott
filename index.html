  <script>

	  let allProducts = [];

async function loadProducts() {
  try {
    const response = await fetch(
      "https://raw.githubusercontent.com/shan99d-a11y/digibott/main/products.json"
    );

    allProducts = await response.json();

    renderProducts(allProducts);
  } catch (err) {
    console.error("Failed to load products:", err);
  }
}

function renderProducts(products) {
  const grid = document.getElementById("productGrid");

  grid.innerHTML = products.map(product => `
    <div class="card">
      <a href="${product.url}" target="_blank">
        <img
          src="${product.imageUrl}"
          alt="${product.title}"
          class="product-img"
          loading="lazy"
        />
        <div class="product-title">
          ${product.title}
        </div>
      </a>
    </div>
  `).join("");
}

function filterProducts() {
  const searchTerm =
    document.getElementById("searchInput")
      .value
      .toLowerCase();

  const filtered = allProducts.filter(product =>
    product.title.toLowerCase().includes(searchTerm)
  );

  renderProducts(filtered);
}

loadProducts();

    function autoFitTitle(el) {
  let size = 22; // start big
  el.style.fontSize = size + "px";

  while (el.scrollWidth > el.clientWidth && size > 8) {
    size--;
    el.style.fontSize = size + "px";
  }
}

document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll('.product-title').forEach(autoFitTitle);
});
    const cards = document.querySelectorAll('.card');

const products = Array.from(cards).map(card => {
  const a = card.querySelector('a');
  const img = card.querySelector('img');
  const title = card.querySelector('.product-title');

  return {
    link: a.href,

  };
});
    let url = window.location.href;
    
    document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', function(e) {

    const title = card.querySelector('.product-title').innerText;
    const formattedTitle = "https://www.digibott.com/" + title.replace(/\s+/g, '+');

    navigator.clipboard.writeText(formattedTitle).catch(err => {
      console.log("Clipboard error:", err);
    });
  });
});
    
    document.querySelectorAll('.product-title').forEach(el => {
      let fontSize = 20; // Start large
      el.style.fontSize = fontSize + 'px';
      while (el.scrollWidth > el.clientWidth && fontSize > 8) {
        fontSize--;
        el.style.fontSize = fontSize + 'px';
      }
    });
    function filterProducts() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('#productGrid .card');

      cards.forEach(card => {
        const title = card.querySelector('.product-title').textContent.toLowerCase();
        card.style.display = title.includes(input) ? 'block' : 'none';
      });
    }
    
    
    function openDialog() {
  document.getElementById("amazonDialog").style.display = "block";
      if (url.includes('amazon.in')) {
        const appUrl = url.replace('https://', 'com.amazon.mobile.shopping.web://');
        window.location.href = appUrl;
      }
}
    
    function closeDialog() {
  document.getElementById("amazonDialog").style.display = "none";
}
    
    function openAmazonApp() {
      if (url.includes('amazon.in')) {
        const appUrl = url.replace('https://', 'com.amazon.mobile.shopping.web://');
        window.location.href = appUrl;
      }
      closeDialog();
}
    
    function swapCardsByIndex(indexA, indexB) {
  // Swap items in array
  [products[indexA], products[indexB]] = [products[indexB], products[indexA]];

  // Re-apply to DOM
  const cards = document.querySelectorAll('.card');

  cards.forEach((card, i) => {
    const p = products[i];
    if (p) {
      const a = card.querySelector('a');
      const img = card.querySelector('img');
      const title = card.querySelector('.product-title');

      a.href = p.link;
      a.target = "_blank";
      img.src = p.image;
      img.alt = p.title;
      title.textContent = p.title;
    }
  });
}
    
    function getCardIndexByTitle(titleText) {
  const cards = document.querySelectorAll('.card');

  for (let i = 0; i < cards.length; i++) {
    const title = cards[i].querySelector('.product-title').textContent.trim();
    if (title === titleText.trim()) {
      return i; // index found
    }
  }
}

    
    document.addEventListener("DOMContentLoaded", function () {
    // 1. Read ?p= parameter from URL
    const params = new URLSearchParams(window.location.search);
    const productQuery = params.get("p");

    if (!productQuery) return;

    const productName = decodeURIComponent(productQuery.replace(/\+/g, " ")).trim().toLowerCase();
    const cards = document.querySelectorAll("#productGrid .card");

    cards.forEach(card => {
        const title = card.querySelector(".product-title");
        const link = card.querySelector("a");

        if (title && link) {
          const cardTitleZZ = title.textContent.trim();
            const cardTitle = title.textContent.trim().toLowerCase();

            if (cardTitle === productName) {
                url = link.href;

                // 2. Check if Amazon link
                if (url.includes("amazon.in")) {
                    // 3. Detect Mobile Device
                    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

                    if (isMobile) {
                      swapCardsByIndex(0, getCardIndexByTitle(cardTitleZZ));
                      openDialog();
                      return;
                     
                    }
                }

                // Normal redirect for non-mobile or non-Amazon
              window.location.replace(url);
            }
        }
    });
});
    
  </script>
